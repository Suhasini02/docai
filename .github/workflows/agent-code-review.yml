name: A2A Agent Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  agent-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger A2A Agent Review
        run: |
          # 1. Get the diff
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

          # 2. Build Payload
          # We include the PR number so the agent knows WHERE to post the comment
          jq -n \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg repo "${{ github.repository }}" \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --rawfile diff pr_diff.txt \
            --arg msgid "$(uuidgen)" \
            '{
              "role": "user",
              "parts": [
                {
                  "kind": "text",
                  "text": "Review this PR and post your comments directly to it.\nRepo: \($repo)\nPR Number: \($pr_number)\nTitle: \($title)\nURL: \($url)\n\nDiff:\n\($diff)"
                }
              ],
              "messageId": $msgid
            }' > payload.json

          # 3. Send to Agent and exit
          echo "Sending request to Agent..."
          curl -i -X POST "https://form-agent-890362666088.us-central1.run.app/a2a/app" \
            -H "Content-Type: application/json" \
            -d @payload.json
