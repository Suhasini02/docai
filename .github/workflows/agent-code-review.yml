name: A2A Agent Code Review

on:
  pull_request:
    # Trigger on any PR to any branch
    types: [opened, synchronize, reopened]

jobs:
  agent-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger Agent Review
        id: trigger_agent
        run: |
          # 1. Fetch the target branch to ensure we can compare
          git fetch origin ${{ github.base_ref }}

          # 2. Generate the diff between the PR and the target branch
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

          # 3. Create the EXACT payload your Agent's Pydantic model expects
          # Note: We use 'pr_id' as indicated in your error message
          jq -n \
            --arg method "review_pr" \
            --arg repo "${{ github.repository }}" \
            --arg pr_id "${{ github.event.pull_request.number }}" \
            --rawfile diff pr_diff.txt \
            '{
              "method": $method,
              "repo": $repo,
              "pr_id": $pr_id,
              "diff": $diff
            }' > payload.json

          # 4. Log the payload for debugging (Optional, but helpful)
          echo "Sending the following JSON to the Agent:"
          cat payload.json

          # 5. Send the POST request
          # Using -i to see the HTTP headers in the response log
          curl -i -X POST "https://form-agent-890362666088.us-central1.run.app/a2a/app" \
            -H "Content-Type: application/json" \
            -d @payload.json
