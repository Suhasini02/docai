name: A2A Agent Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  agent-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare and Send to A2A Agent
        id: a2a_call
        run: |
          # 1. Capture PR details
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          DIFF=$(git diff origin/${{ github.base_ref }} HEAD)

          # 2. Construct the A2A Protocol Payload
          # We wrap the code/repo info in a "text" part for the agent to process
          PAYLOAD=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg url "$PR_URL" \
            --arg diff "$DIFF" \
            '{
              "parts": [
                {
                  "text": "Review this Pull Request.\nRepo: \($url)\nTitle: \($title)\n\nCode Changes:\n\($diff)"
                }
              ]
            }')

          # 3. POST to your Cloud Run Agent
          RESPONSE=$(curl -s -X POST "https://form-agent-890362666088.us-central1.run.app/a2a/app" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # 4. Extract agent's response text (A2A usually returns parts[].text)
          AGENT_FEEDBACK=$(echo $RESPONSE | jq -r '.parts[0].text // "Agent failed to provide a text response."')
          
          # Clean up for GitHub output (handling multi-line)
          {
            echo "feedback<<EOF"
            echo "$AGENT_FEEDBACK"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post Agent Comment
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🤖 AI Code Review
            ${{ steps.a2a_call.outputs.feedback }}
