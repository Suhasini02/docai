name: Agent PR Review

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  agent-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Collect PR metadata + diff ───────────────────────────────────────
      - name: Gather PR info
        id: pr_info
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          DIFF=$(git diff origin/${BASE_BRANCH}...HEAD -- | head -c 8000)
          DIFF_ESCAPED=$(echo "$DIFF" | python3 -c "import sys, json; print(json.dumps(sys.stdin.read()))")
          echo "diff_escaped=$DIFF_ESCAPED" >> $GITHUB_OUTPUT

      # ── 2. Call your A2A agent ───────────────────────────────────────────────
      - name: Call A2A Agent
        id: agent_call
        env:
          AGENT_URL: ${{ secrets.AGENT_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DIFF_ESCAPED: ${{ steps.pr_info.outputs.diff_escaped }}
        run: |
          PAYLOAD=$(python3 << 'PYEOF'
          import json, os, uuid

          diff = json.loads(os.environ['DIFF_ESCAPED'])

          message_text = (
            "Please review this pull request and provide feedback.\n\n"
            "## PR Details\n"
            f"- **Repository**: {os.environ['REPO']}\n"
            f"- **PR Number**: #{os.environ['PR_NUMBER']}\n"
            f"- **Title**: {os.environ['PR_TITLE']}\n"
            f"- **Author**: @{os.environ['PR_AUTHOR']}\n"
            f"- **Branch**: `{os.environ['HEAD_BRANCH']}` -> `{os.environ['BASE_BRANCH']}`\n\n"
            "## Description\n"
            f"{os.environ.get('PR_BODY') or '_No description provided._'}\n\n"
            "## Diff\n"
            "```diff\n"
            f"{diff[:6000]}\n"
            "```\n\n"
            "Please provide:\n"
            "1. A summary of what this PR does\n"
            "2. Potential issues or concerns\n"
            "3. Suggestions for improvement\n"
            "4. An overall assessment (Approve / Request Changes / Neutral)"
          )

          # ✅ Exact A2A format confirmed from Postman screenshot:
          #    - parts use 'kind': 'text'  (NOT 'type')
          #    - messageId is required (UUID)
          payload = {
            "jsonrpc": "2.0",
            "id": f"pr-{os.environ['PR_NUMBER']}-review",
            "method": "message/send",
            "params": {
              "id": f"pr-{os.environ['PR_NUMBER']}-review",
              "message": {
                "role": "user",
                "parts": [
                  {
                    "kind": "text",
                    "text": message_text
                  }
                ],
                "messageId": str(uuid.uuid4())
              }
            }
          }

          print(json.dumps(payload))
          PYEOF
          )

          echo "Calling agent..."

          RESPONSE=$(curl -s -X POST "$AGENT_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --max-time 120)

          echo "Raw response: $RESPONSE"

          # ✅ Parse using confirmed response structure (screenshot lines 47-57):
          #    result.parts[] where kind == "text" and role == "agent"
          AGENT_REPLY=$(echo "$RESPONSE" | python3 << 'PYEOF'
          import sys, json

          try:
            data = json.load(sys.stdin)
            reply = None
            result = data.get("result", {})

            # Primary path: result.parts[] (confirmed in screenshot)
            for part in result.get("parts", []):
              if part.get("kind") == "text":
                reply = part.get("text", "")
                break

            # Fallback 1: result.status.message.parts[]
            if not reply:
              for part in result.get("status", {}).get("message", {}).get("parts", []):
                if part.get("kind") == "text":
                  reply = part.get("text", "")
                  break

            # Fallback 2: result.artifacts[].parts[]
            if not reply:
              for artifact in result.get("artifacts", []):
                for part in artifact.get("parts", []):
                  if part.get("kind") == "text":
                    reply = part.get("text", "")
                    break
                if reply:
                  break

            if reply:
              print(reply.strip())
            else:
              print("_Agent responded but no text could be extracted._\n\nRaw response:\n```json\n" + json.dumps(data, indent=2)[:3000] + "\n```")

          except Exception as e:
            print(f"_Failed to parse agent response: {e}_")
          PYEOF
          )

          echo "$AGENT_REPLY" > /tmp/agent_reply.txt
          echo "Reply saved."

      # ── 3. Post agent reply as PR comment ───────────────────────────────────
      - name: Post comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const agentReply = fs.readFileSync('/tmp/agent_reply.txt', 'utf8').trim();

            const body = [
              '## 🤖 Agent Review',
              '',
              agentReply,
              '',
              '---',
              `*Triggered by commit \`${context.sha.substring(0, 7)}\` · Branch: \`${{ github.event.pull_request.head.ref }}\` → \`main\`*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            console.log('Comment posted successfully.');
