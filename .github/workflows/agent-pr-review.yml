name: Agent PR Review

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  agent-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Collect PR metadata + diff ───────────────────────────────────────
      - name: Gather PR info
        id: pr_info
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          DIFF=$(git diff origin/${BASE_BRANCH}...HEAD -- | head -c 8000)
          DIFF_ESCAPED=$(echo "$DIFF" | python3 -c "import sys, json; print(json.dumps(sys.stdin.read()))")
          echo "diff_escaped=$DIFF_ESCAPED" >> $GITHUB_OUTPUT

      # ── 2. Build payload & call agent ────────────────────────────────────────
      - name: Call A2A Agent
        id: agent_call
        env:
          AGENT_URL: ${{ secrets.AGENT_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DIFF_ESCAPED: ${{ steps.pr_info.outputs.diff_escaped }}
        run: |
          # Write Python script to a file to avoid heredoc shell-quoting issues
          cat > /tmp/build_payload.py << 'PYEOF'
          import json, os, uuid, re
 
           # Extract Jira ID from description
          pr_body = os.environ.get('PR_BODY') or ""
          jira_match = re.search(r'([A-Z]+-\d+)', pr_body)
          jira_id = jira_match.group(1) if jira_match else "None Provided"

          diff = json.loads(os.environ['DIFF_ESCAPED'])

          message_text = (
            f"Please review this pull request and provide feedback.\n\n"
            "## PR Details\n"
            "- **Repository**: " + os.environ['REPO'] + "\n"
            "- **PR Number**: #" + os.environ['PR_NUMBER'] + "\n"
            "- **Title**: " + os.environ['PR_TITLE'] + "\n"
            "- **Author**: @" + os.environ['PR_AUTHOR'] + "\n"
            "- **Branch**: `" + os.environ['HEAD_BRANCH'] + "` -> `" + os.environ['BASE_BRANCH'] + "`\n\n"
            "## Description\n"
            + (os.environ.get('PR_BODY') or '_No description provided._') + "\n\n"
            "## Diff\n```diff\n"
            + diff[:6000] + "\n```\n\n"
            "Please perform a dual-purpose review for this pull request.\n\n"
           "### PART 1: General Code Review (Usual Flow)\n"
            "1. A summary of what this PR does\n"
            "2. Potential issues or concerns\n"
            "3. Suggestions for improvement\n"
            "4. An overall assessment (Approve / Request Changes / Neutral)\n"

            "### PART 2: Jira Compliance Check (New Addition)\n"
              f"The associated Jira Ticket is: **{jira_id}**\n"
              "1. check the complete repo code files , does this code satisfy the intent of the ticket?\n"
              "2. Are there any missing requirements or out-of-scope changes?\n"
              "3. Provide a 'Compliance Verdict' (Compliant / Non-Compliant).Also provide the jira ticket discription fetched. \n\n"
          )

          payload = {
            "jsonrpc": "2.0",
            "id": "pr-" + os.environ['PR_NUMBER'] + "-review",
            "method": "message/send",
            "params": {
              "message": {
                "role": "user",
                "parts": [
                  {
                    "kind": "text",
                    "text": message_text
                  }
                ],
                "messageId": str(uuid.uuid4())
              }
            }
          }

          print(json.dumps(payload))
          PYEOF

          PAYLOAD=$(python3 /tmp/build_payload.py)
          echo "Payload built. Calling agent..."

          RESPONSE=$(curl -s -X POST "$AGENT_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --max-time 120)

          echo "Raw response received (length: ${#RESPONSE})"

          # Write Python parser to a file (avoids heredoc pipe issues)
          cat > /tmp/parse_response.py << 'PYEOF'
          import sys, json

          raw = sys.stdin.read().strip()
          if not raw:
            print("_Agent returned an empty response._")
            sys.exit(0)

          try:
            data = json.loads(raw)
          except Exception as e:
            print(f"_Could not parse JSON response: {e}_\n\nRaw:\n```\n{raw[:2000]}\n```")
            sys.exit(0)

          reply = None
          result = data.get("result", {})

          # Path 1: result.artifacts[0].parts[]  ← confirmed in your raw response log
          for artifact in result.get("artifacts", []):
            for part in artifact.get("parts", []):
              if part.get("kind") == "text":
                reply = part.get("text", "")
                break
            if reply:
              break

          # Path 2: result.parts[]
          if not reply:
            for part in result.get("parts", []):
              if part.get("kind") == "text":
                reply = part.get("text", "")
                break

          # Path 3: result.status.message.parts[]
          if not reply:
            for part in result.get("status", {}).get("message", {}).get("parts", []):
              if part.get("kind") == "text":
                reply = part.get("text", "")
                break

          # Path 4: result.history — last message with role == "agent"
          if not reply:
            for msg in reversed(result.get("history", [])):
              if msg.get("role") == "agent":
                for part in msg.get("parts", []):
                  if part.get("kind") == "text":
                    reply = part.get("text", "")
                    break
              if reply:
                break

          if reply:
            print(reply.strip())
          else:
            print("_Agent responded but no text could be extracted._\n\nRaw response:\n```json\n" + json.dumps(data, indent=2)[:3000] + "\n```")
          PYEOF

          # Pipe response directly into the parser script (no heredoc)
          echo "$RESPONSE" | python3 /tmp/parse_response.py > /tmp/agent_reply.txt
          echo "Reply saved. Preview:"
          head -5 /tmp/agent_reply.txt

      # ── 3. Post agent reply as PR comment ───────────────────────────────────
      - name: Post comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const agentReply = fs.readFileSync('/tmp/agent_reply.txt', 'utf8').trim();

            const body = [
              '## 🤖 Agent Review',
              '',
              agentReply,
              '',
              '---',
              `*Triggered by commit \`${context.sha.substring(0, 7)}\` · Branch: \`${{ github.event.pull_request.head.ref }}\` → \`main\`*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            console.log('Comment posted successfully.');
